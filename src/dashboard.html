<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Usage Dashboard</title>
    <style>
        :root {
            --bg-dark: #14141b;
            --bg-card: #1e1e29;
            --text-main: #f8f8f2;
            --text-muted: #8b8b9b;
            --accent-green: #50fa7b;
            --accent-yellow: #f1fa8c;
            --accent-blue: #8be9fd;
            --accent-red: #ff5555;
            --border-color: #2e2e3e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 40px;
            margin: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            margin: 0;
        }

        .last-updated {
            color: var(--text-muted);
            font-size: 12px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 24px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.codex {
            background: var(--accent-blue);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 8px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 18px 20px;
        }

        .card-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 28px;
            font-weight: bold;
            margin: 8px 0 4px;
        }

        .green {
            color: var(--accent-green);
        }

        .yellow {
            color: var(--accent-yellow);
        }

        .red {
            color: var(--accent-red);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2a3a;
            border-radius: 4px;
            margin: 8px 0 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-fill.green {
            background: var(--accent-green);
        }

        .progress-fill.yellow {
            background: var(--accent-yellow);
        }

        .progress-fill.red {
            background: var(--accent-red);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
        }

        .note {
            margin-top: 24px;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Codex Usage Dashboard</h1>
        <span class="last-updated">Updated: <span id="updatedAt"></span></span>
    </div>

    <div class="section-title"><span class="dot codex"></span>Codex</div>
    <div class="grid-2">
        <div class="card">
            <div class="card-label">5-Hour Window</div>
            <div id="codex5hValue" class="card-value"></div>
            <div class="progress-bar"><div id="codex5hProgress" class="progress-fill"></div></div>
            <div class="card-footer">
                <span id="codex5hStatus"></span>
                <span id="codex5hReset"></span>
            </div>
        </div>
        <div class="card">
            <div class="card-label">7-Day Rolling</div>
            <div id="codexWeeklyValue" class="card-value"></div>
            <div class="progress-bar"><div id="codexWeeklyProgress" class="progress-fill"></div></div>
            <div class="card-footer">
                <span id="codexWeeklyStatus"></span>
                <span id="codexWeeklyReset"></span>
            </div>
        </div>
    </div>

    <div class="note">
        <strong>Note:</strong> Codex percentages are read from the latest <code>token_count</code> event in
        <code>~/.codex/sessions/</code>, including the server-reported reset times for each window.
    </div>
    <script id="dashboard-data" type="application/json">{{dashboardState}}</script>
    <script>
        const stateElement = document.getElementById('dashboard-data');
        const state = JSON.parse(stateElement?.textContent ?? '{}');

        const applyUsage = (prefix, usage) => {
            const valueElement = document.getElementById(`${prefix}Value`);
            const progressElement = document.getElementById(`${prefix}Progress`);
            const statusElement = document.getElementById(`${prefix}Status`);
            const resetElement = document.getElementById(`${prefix}Reset`);

            if (!valueElement || !progressElement || !statusElement || !resetElement || !usage) {
                return;
            }

            valueElement.textContent = `${usage.pct}%`;
            valueElement.classList.add(usage.color);
            progressElement.classList.add(usage.color);
            progressElement.style.width = `${usage.pct}%`;
            statusElement.textContent = usage.status;
            resetElement.textContent = `Resets in ${usage.reset}`;
        };

        const updatedAtElement = document.getElementById('updatedAt');
        if (updatedAtElement) {
            updatedAtElement.textContent = state.updatedAt ?? '';
        }

        applyUsage('codex5h', state.codex5h);
        applyUsage('codexWeekly', state.codexWeekly);
    </script>
</body>
</html>
